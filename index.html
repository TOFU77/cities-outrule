<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cities: OutRuler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;font-size:13px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#header{background:#16213e;padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #0f3460;flex-wrap:wrap}
#header h1{font-size:16px;color:#e94560;letter-spacing:2px}
#year-display{color:#a8d8ea;font-size:14px;font-weight:bold}
#btn-turn{background:#e94560;border:none;color:#fff;padding:5px 16px;border-radius:4px;cursor:pointer;font-size:13px}
#btn-turn:hover{background:#c73652}
#btn-5year{background:#7c2030;border:none;color:#ffaaaa;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
#btn-5year:hover{background:#a02840}
#btn-save,#btn-load{background:#0f3460;border:1px solid #1a4a80;color:#a8d8ea;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
#main{display:flex;flex:1;overflow:hidden}
#left-panel{width:260px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden}
#right-panel{width:240px;background:#16213e;border-left:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden}
.panel-title{background:#0f3460;padding:5px 10px;font-size:12px;font-weight:bold;color:#a8d8ea;letter-spacing:1px}
#resources{padding:6px;overflow-y:auto;flex:1}
.res-group{margin-bottom:10px}
.res-group-title{color:#e94560;font-size:11px;margin-bottom:4px;font-weight:bold}
.res-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.res-name{width:38px;color:#888;font-size:11px}
.res-bar-wrap{flex:1;background:#0a0a1a;height:24px;border-radius:4px;overflow:hidden;position:relative}
.res-bar{position:absolute;top:0;left:0;width:0;height:67%;border-radius:4px 4px 0 0;transition:width 0.3s}
.res-preview-bar{position:absolute;bottom:0;left:0;width:0;height:33%;border-radius:0 0 4px 4px;transition:width 0.3s;opacity:0.80;display:none}
.res-val{width:56px;text-align:right;font-size:11px;color:#ccc}
.res-delta{width:46px;text-align:right;font-size:10px}
#facility-list{padding:6px;overflow-y:auto;flex:1}
.fac-btn{display:flex;align-items:center;gap:6px;width:100%;padding:4px 6px;margin-bottom:3px;background:#0f3460;border:1px solid transparent;border-radius:4px;cursor:pointer;text-align:left;color:#ccc;font-size:12px;transition:all 0.15s}
.fac-btn:hover{background:#1a4a80;border-color:#a8d8ea}
.fac-btn.selected{background:#1a4a80;border-color:#e94560}
.fac-btn .fac-icon{font-size:16px;width:20px;text-align:center}
.fac-btn .fac-info{flex:1}
.fac-btn .fac-cost{font-size:10px;color:#888}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block}
#bottom-bar{background:#16213e;border-top:1px solid #0f3460;padding:4px 10px;display:flex;gap:12px;align-items:center;min-height:28px}
#status-msg{color:#a8d8ea;font-size:12px;flex:1}
#sector-tabs{display:flex;border-bottom:1px solid #0f3460}
.sector-tab{flex:1;padding:5px 4px;text-align:center;cursor:pointer;font-size:11px;color:#888;border-bottom:2px solid transparent}
.sector-tab.active{color:#e94560;border-bottom-color:#e94560}
#log-panel{padding:6px;overflow-y:auto;flex:1;font-size:11px}
.log-entry{padding:2px 4px;border-left:2px solid #0f3460;margin-bottom:2px;color:#aaa}
.log-entry.event{border-left-color:#e94560;color:#ffb3b3}
.log-entry.good{border-left-color:#4ade80;color:#b3ffcc}
.log-entry.warn{border-left-color:#fbbf24;color:#ffe5b3}
.log-entry.crisis{border-left-color:#ff4400;color:#ff9977;font-weight:bold}
#tech-panel{padding:6px;overflow-y:auto;max-height:200px;border-top:1px solid #0f3460}
.tech-btn{display:flex;align-items:center;gap:6px;width:100%;padding:4px 6px;margin-bottom:3px;background:#0a1628;border:1px solid #1a3a60;border-radius:4px;cursor:pointer;text-align:left;color:#ccc;font-size:11px}
.tech-btn:hover:not([disabled]){background:#0f3460}
.tech-btn[disabled]{opacity:0.5;cursor:default}
.tech-btn.done{border-color:#4ade80;color:#4ade80}
#npc-header{flex:1;display:flex;align-items:center;gap:8px;background:#0a1628;border:1px solid #1a3a60;border-radius:6px;padding:4px 12px;min-width:0;overflow:hidden}
#npc-label{color:#a8d8ea;font-weight:bold;font-size:13px;white-space:nowrap;flex-shrink:0}
#npc-bubble{color:#c0d8f0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
#modal.open{display:flex}
#modal-box{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:20px;min-width:360px;max-width:520px;max-height:90vh;overflow-y:auto}
#modal-box h2{color:#e94560;margin-bottom:12px;font-size:16px}
#modal-box p{color:#ccc;margin-bottom:8px;line-height:1.6;font-size:12px}
.modal-btn{background:#0f3460;border:1px solid #1a4a80;color:#a8d8ea;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;margin-right:8px;margin-top:8px}
.modal-btn.primary{background:#e94560;border-color:#e94560;color:#fff}
#preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.preset-card{background:#0a1628;border:1px solid #1a3a60;border-radius:6px;padding:8px;cursor:pointer;transition:all 0.15s}
.preset-card:hover{border-color:#a8d8ea;background:#0f2040}
.preset-card h3{color:#a8d8ea;font-size:12px;margin-bottom:3px}
.preset-card p{color:#666;font-size:10px}
#crisis-indicator{display:none;color:#ff4400;font-size:11px;font-weight:bold;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#facility-stance{padding:10px 8px 8px;border-bottom:1px solid #1a3a60;background:#0a1220}
.stance-sec-label{color:#a8d8ea;font-size:11px;font-weight:bold;margin-bottom:7px}
.stance-row-btns{display:flex;gap:6px}
.stance-row-btn{flex:1;padding:8px 4px;text-align:center;border-radius:5px;cursor:pointer;font-size:11px;border:2px solid #222;background:#0a1628;color:#555;transition:all 0.15s;line-height:1.5}
.stance-row-btn:hover{border-color:#555;color:#aaa}
.stance-row-btn.s-active{border-color:#4ade80;background:#0f2a10;color:#4ade80}
.stance-row-btn.s-normal{border-color:#a8d8ea;background:#0f2040;color:#a8d8ea}
.stance-row-btn.s-light{border-color:#fbbf24;background:#1a1400;color:#fbbf24}
.modal-btn.warn{background:#7c3000;border-color:#f97316;color:#fed7aa}
.modal-btn.success{background:#14532d;border-color:#4ade80;color:#bbf7d0}
#modal2{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.80);z-index:150;align-items:center;justify-content:center}
#modal2.open{display:flex}
#modal2-box{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:20px;min-width:360px;max-width:520px;max-height:90vh;overflow-y:auto}
#modal2-box h2{margin-bottom:10px;font-size:15px}
#modal2-box p{color:#ccc;margin-bottom:6px;line-height:1.6;font-size:12px}
.tech-family-prod{color:#60a5fa}.tech-family-green{color:#4ade80}.tech-family-civic{color:#f9a8d4}
.tech-tier{font-size:9px;background:#0a1628;border:1px solid #1a3a60;border-radius:3px;padding:1px 4px;margin-left:4px}
#tooltip{position:fixed;display:none;background:#0d1f3c;border:1px solid #2a5a90;border-radius:7px;padding:9px 13px;font-size:11px;color:#ccc;max-width:230px;z-index:300;pointer-events:none;line-height:1.7;box-shadow:0 4px 16px #000a}
#tooltip .tt-title{color:#a8d8ea;font-weight:bold;font-size:12px;margin-bottom:5px;border-bottom:1px solid #1a3a60;padding-bottom:3px}
#tooltip .tt-formula{color:#667;font-size:10px;margin-bottom:5px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:10px}
#tooltip .tt-pos{color:#4ade80}
#tooltip .tt-neg{color:#f87171}
#tooltip .tt-neu{color:#888}

/* ===== MOBILE LAYOUT (≤768px) ===== */
@media (max-width:768px){
  body{overflow:hidden;height:100dvh;flex-direction:column}

  /* ---- ヘッダー2行化 ---- */
  #header{
    padding:4px 8px;gap:4px;
    flex-wrap:wrap;          /* 2行に折り返す */
    overflow:visible;
  }
  /* 1行目: タイトル～危機インジケーターまで横並び */
  #header h1{font-size:11px;letter-spacing:0;flex-shrink:0;color:#e94560}
  #year-display{font-size:11px;flex-shrink:0}
  #btn-turn{padding:4px 9px;font-size:11px;flex-shrink:0}
  #btn-5year{padding:3px 6px;font-size:10px;flex-shrink:0}
  #btn-save,#btn-load{padding:3px 6px;font-size:10px;flex-shrink:0}
  #crisis-indicator{font-size:10px;flex-shrink:0}
  #header-preset{display:none}

  /* 2行目: OTOMOメッセージ全幅 */
  #npc-header{
    order:10;         /* 他要素の後ろに */
    width:100%;       /* 全幅 → 次の行に折り返す */
    flex-shrink:0;
    padding:3px 8px;
    border-radius:4px;
    min-width:0;
    gap:5px;
  }
  #npc-label{font-size:11px;letter-spacing:0;padding:0}
  #npc-bubble{font-size:12px;white-space:normal;line-height:1.4} /* 折り返し許可 */

  /* ---- メインエリア ---- */
  #main{position:relative;flex:1;overflow:hidden}

  /* 各パネルをフルサイズで重ねる */
  #left-panel,#center,#right-panel{
    position:absolute;inset:0;
    width:100%;height:100%;
    border:none;
    display:none;
  }
  #left-panel.mob-active,#center.mob-active,#right-panel.mob-active{
    display:flex;
  }
  #right-panel{width:100%;flex-direction:column}
  #left-panel{width:100%}

  /* ---- right-panel内セクション切替 (mobile) ---- */
  /* PC時は全表示、mobile時はJS制御で1セクションのみ表示 */
  #right-facility-section,#right-tech-section,#right-log-section{
    display:none;
    flex-direction:column;
    flex:1;
    overflow:hidden;
    min-height:0;
  }
  #right-facility-section.mob-sec-active,
  #right-tech-section.mob-sec-active,
  #right-log-section.mob-sec-active{
    display:flex;
  }
  /* facility-list はflex:1でスクロール */
  #right-facility-section #facility-list{flex:1;overflow-y:auto}
  /* tech/log は全体スクロール */
  #right-tech-section #tech-panel{flex:1;max-height:none;overflow-y:auto}
  #right-log-section #log-panel{flex:1;max-height:none;overflow-y:auto}

  /* リソースバー */
  .res-bar-wrap{height:28px}
  .res-name{width:44px;font-size:12px}
  .res-val{font-size:12px;width:60px}

  /* 施設ボタン */
  .fac-btn{padding:7px 8px;font-size:13px}
  .fac-btn .fac-icon{font-size:18px;width:24px}

  /* スタンスボタン */
  .stance-row-btn{padding:10px 4px;font-size:12px}

  /* キャンバス */
  #canvas-wrap{flex:1;position:relative}

  /* マップタブの選択施設インジケーター */
  #mob-fac-indicator{
    position:absolute;bottom:0;left:0;right:0;z-index:10;
    background:rgba(14,30,60,0.90);
    border-top:1px solid #1a4a80;
    padding:6px 12px;
    display:flex;align-items:center;gap:8px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    min-height:36px;
  }
  #mob-fac-indicator .mfi-icon{font-size:20px;flex-shrink:0}
  #mob-fac-indicator .mfi-text{font-size:12px;color:#a8d8ea;flex:1}
  #mob-fac-indicator .mfi-hint{font-size:10px;color:#556;flex-shrink:0}
  #mob-fac-indicator.has-fac .mfi-text{color:#e94560}
  #mob-fac-indicator.has-fac .mfi-hint{color:#a8d8ea}

  /* bottom-barはインジケーターで代替するのでモバイル非表示 */
  #bottom-bar{display:none}

  /* ---- ボトムタブバー(5タブ) ---- */
  #mobile-tabs{
    display:flex;
    background:#0f3460;
    border-top:2px solid #1a4a80;
    flex-shrink:0;
  }
  .mob-tab{
    flex:1;padding:8px 2px 6px;
    text-align:center;
    color:#666;cursor:pointer;
    border-top:3px solid transparent;
    transition:all 0.15s;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .mob-tab.active{color:#a8d8ea;border-top-color:#e94560}
  .mob-tab .mob-tab-icon{font-size:16px;display:block;line-height:1.2}
  .mob-tab .mob-tab-label{font-size:9px;display:block;margin-top:1px}

  /* モーダル */
  #modal-box,#modal2-box{
    min-width:auto;width:92vw;max-width:420px;padding:14px;
  }
  #preset-grid{grid-template-columns:1fr 1fr}
  .preset-card{padding:8px 6px}
  .preset-card h3{font-size:11px}
  .preset-card p{font-size:9px}

  /* ツールチップ */
  #tooltip{max-width:85vw;font-size:12px}
}

/* PC時はモバイル専用要素を非表示・right-panelを従来通り */
@media (min-width:769px){
  #mobile-tabs{display:none}
  #mob-fac-indicator{display:none!important}

  /* right-panel: 縦にflexで全セクション表示 */
  #right-panel{flex-direction:column}
  #right-facility-section{
    display:flex!important;
    flex-direction:column;
    flex:1;
    min-height:0;
    overflow:hidden;
  }
  #right-facility-section #facility-list{flex:1;overflow-y:auto}
  #right-tech-section{
    display:block!important;
    flex-shrink:0;
    border-top:1px solid #0f3460;
  }
  #right-tech-section #tech-panel{max-height:200px;overflow-y:auto}
  #right-log-section{
    display:flex!important;
    flex-direction:column;
    flex:1;
    min-height:0;
    border-top:1px solid #0f3460;
    overflow:hidden;
  }
  #right-log-section #log-panel{flex:1;overflow-y:auto}
}
</style>
</head>
<body>

<div id="header">
  <h1>CITIES: OUTRULE</h1>
  <span id="year-display">Year 1</span>
  <button id="btn-turn">▶ ターン進行</button>
  <button id="btn-5year">⏩ 5年</button>
  <button id="btn-save">保存</button>
  <button id="btn-load">読込</button>
  <span id="header-preset" style="color:#666;font-size:11px"></span>
  <span id="crisis-indicator">⚠ 危機進行中</span>
  <div id="npc-header">
    <span id="npc-label">🏙 OTOMO:</span>
    <span id="npc-bubble">都市を設立しましょう。</span>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div class="panel-title">📊 リソース</div>
    <div id="resources"></div>
  </div>
  <div id="center">
    <div id="canvas-wrap">
      <canvas id="map-canvas"></canvas>
      <!-- モバイル: 選択施設インジケーター（タップで施設タブへ）-->
      <div id="mob-fac-indicator" style="display:none">
        <span class="mfi-icon">➕</span>
        <span class="mfi-text">施設未選択 — 施設タブで選んでください</span>
        <span class="mfi-hint">▶施設</span>
      </div>
    </div>
    <div id="bottom-bar">
      <span id="status-msg">施設を選んでタイルに配置してください</span>
    </div>
  </div>
  <div id="right-panel">
    <!-- 施設セクション -->
    <div id="right-facility-section">
      <div id="sector-tabs">
        <div class="sector-tab active" data-sector="RURAL">農村</div>
        <div class="sector-tab" data-sector="INDU">産業</div>
        <div class="sector-tab" data-sector="ARTS">学芸</div>
        <div class="sector-tab" data-sector="NATU">自然</div>
      </div>
      <div id="facility-list"></div>
    </div>
    <!-- テクセクション -->
    <div id="right-tech-section">
      <div class="panel-title">🔬 テクノロジー</div>
      <div id="tech-panel"></div>
    </div>
    <!-- ログセクション -->
    <div id="right-log-section">
      <div class="panel-title">📜 ログ</div>
      <div id="log-panel"></div>
    </div>
  </div>
</div>

<!-- モバイル用ボトムタブ 5分割 (PC時はCSS非表示) -->
<div id="mobile-tabs">
  <div class="mob-tab active" data-panel="left" data-sec="">
    <span class="mob-tab-icon">📊</span>
    <span class="mob-tab-label">資源</span>
  </div>
  <div class="mob-tab" data-panel="center" data-sec="">
    <span class="mob-tab-icon">🗺</span>
    <span class="mob-tab-label">マップ</span>
  </div>
  <div class="mob-tab" data-panel="right" data-sec="facility">
    <span class="mob-tab-icon">🏗</span>
    <span class="mob-tab-label">施設</span>
  </div>
  <div class="mob-tab" data-panel="right" data-sec="tech">
    <span class="mob-tab-icon">🔬</span>
    <span class="mob-tab-label">テク</span>
  </div>
  <div class="mob-tab" data-panel="right" data-sec="log">
    <span class="mob-tab-icon">📜</span>
    <span class="mob-tab-label">ログ</span>
  </div>
</div>

<div id="tooltip"></div>
<div id="modal2"><div id="modal2-box"></div></div>
<div id="modal" class="open">
  <div id="modal-box">
    <h2>Cities: OutRuler</h2>
    <p>都市プリセットを選んでゲームを開始してください。</p>
    <div id="preset-grid"></div>
    <button class="modal-btn primary" id="btn-custom-start">カスタム（標準設定）</button>
  </div>
</div>

<script>
// ==================== FACILITY DATA ====================

  AGRO:   { name:"農工場",         sector:"RURAL", icon:"🌽", color:"#86efac",

            build_cost:{G:300,MAT:150}, maint_cost:{G:25,MAT:8} },

            build_cost:{G:250,MAT:120}, maint_cost:{G:15,MAT:4} },
  HOUS:   { name:"住宅・サービス", sector:"INDU",  icon:"🏠", color:"#c4b5fd",
            io_base:{out:{HAP:0.015,KON:0.003},in:{MAT:1,G:2,FOOD:1,NRG:1},labor:1}, env_sensitivity:0.06,
            build_cost:{G:30,MAT:15}, maint_cost:{G:2,MAT:1} },
  WASTE:  { name:"廃棄物処理",     sector:"INDU",  icon:"♻️", color:"#a3e635",
            io_base:{out:{MAT:2},in:{KON:0.4,NRG:3,G:4},labor:2}, env_sensitivity:-0.015,
            build_cost:{G:500,MAT:20}, maint_cost:{G:40,MAT:2} },
  POLICE: { name:"警察署",         sector:"INDU",  icon:"🚔", color:"#f472b6",
            io_base:{out:{},in:{KON:1,G:8},labor:3}, env_sensitivity:0.0,
            build_cost:{G:200,MAT:10}, maint_cost:{G:5,MAT:1} },
  EPA:    { name:"環境対策局",     sector:"INDU",  icon:"🌿", color:"#34d399",
            io_base:{out:{},in:{KON:1.5,G:10,SCI:3},labor:2}, env_sensitivity:-0.02,

// ==================== STATE ====================
const MAP_W=20, MAP_H=15;
let state=null, map=[], selectedFacility=null, activeSector="RURAL";
let year=1, logs=[], prevStocks=null, techEffects={};

function genTechs(seed){
  var result={};
  var families=["PROD","GREEN","CIVIC"];
  var rng=seed;
  function rand(){rng=(rng*1664525+1013904223)&0xffffffff;return(rng>>>0)/0xffffffff;}
  families.forEach(function(fam){
    var bank=NAMEBANKS[fam].slice();
    for(var tier=1;tier<=3;tier++){
      var idx=Math.floor(rand()*bank.length);
      var coreName=bank.splice(idx,1)[0];
      var id="T_"+fam+"_"+tier;
      var effVal,effVal2;
      if(fam==="PROD"){effVal=1.05+tier*0.03+rand()*0.02;effVal2=-(0.01+tier*0.01+rand()*0.005);}
      else if(fam==="GREEN"){effVal=0.008+tier*0.004+rand()*0.003;effVal2=1.02+tier*0.015+rand()*0.01;}
      else{effVal=1.04+tier*0.025+rand()*0.015;effVal2=-(0.005+tier*0.003);}
      var effects;
      if(fam==="PROD") effects=[{target:"FACT",type:"mult",key:"efficiency",value:+effVal.toFixed(3)},{target:"GLOBAL",type:"add",key:"env_sensitivity_offset",value:+effVal2.toFixed(4)}];
      else if(fam==="GREEN") effects=[{target:"GLOBAL",type:"add",key:"env_recovery_rate",value:+effVal.toFixed(4)},{target:"GLOBAL",type:"mult",key:"NRG_use_eff",value:+effVal2.toFixed(3)}];
      else effects=[{target:"SECTOR:ARTS",type:"mult",key:"efficiency",value:+effVal.toFixed(3)},{target:"GLOBAL",type:"add",key:"cul_to_kon_absorb",value:+Math.abs(effVal2).toFixed(4)}];
      var baseSCI=fam==="CIVIC"?80:fam==="GREEN"?70:60;
      var baseG=fam==="CIVIC"?120:fam==="GREEN"?100:90;
      result[id]={name:fam==="PROD"?"生産性：":fam==="GREEN"?"保全・緑化：":"社会性："+coreName+TECH_SUFFIXES[tier],
        family:fam,tier:tier,baseSCI:baseSCI,baseG:baseG,effect:effects,done:false};
    }
  });
  return result;
}

function calcTechCost(techKey,allTech){
  var def=allTech[techKey];
  if(!def) return {SCI:0,G:0};
  var baseSCI=def.baseSCI||150,baseG=def.baseG||300;
  var tier=def.tier||1,fam=def.family||"PROD";
  var nf=0,nt=0;
  for(var k in allTech){
    if(k===techKey) continue;
    if(allTech[k].done){
      nt++;
      if(allTech[k].family===fam) nf++;
    }
  }
  var scale=Math.pow(1.80,tier-1)*Math.pow(1.20,nf)*Math.pow(1.10,nt);
  return{SCI:Math.ceil(Math.max(40,baseSCI*scale)),G:Math.ceil(Math.max(60,baseG*scale))};
}

function initState(preset){
  var stocks={POP:300,FOOD:500,MAT:400,NRG:350,G:1500,SCI:0,CUL:0,ENV:0.80,INF:0.40,HAP:0.52,RES:0.12,KON:0.18};
  var policies={tax_rate:0.15};
  var sectors={RURAL:{knowledge:0,infra_level:0.3},INDU:{knowledge:0,infra_level:0.5},ARTS:{knowledge:0,infra_level:0.4},NATU:{knowledge:0,infra_level:0.2}};
  var tech={};
  for(var k in TECH_TREE) tech[k]={done:false,family:TECH_TREE[k].family,tier:TECH_TREE[k].tier,baseSCI:TECH_TREE[k].baseSCI,baseG:TECH_TREE[k].baseG,effect:TECH_TREE[k].effect,name:TECH_TREE[k].name};
  if(preset) for(var pk in (preset.policies||{})) policies[pk]=preset.policies[pk];
  var seed=preset?(preset.id.split("").reduce(function(a,c){return a+c.charCodeAt(0);},0)*31337):42424;
  var genT=genTechs(seed);
  for(var gk in genT) tech[gk]=genT[gk];
  var stanceInit={RURAL:"normal",INDU:"normal",ARTS:"normal",NATU:"normal"};
  var sig=preset?preset.signature:{ENV_min:0.65,HAP_min:0.50,KON_max:0.45,label:"標準都市"};
  state={stocks:stocks,policies:policies,sectors:sectors,tech:tech,tileData:{},crisisTurns:0,
    stance:stanceInit,deviationCooldowns:{},pendingDeviation:null,signature:sig,presetId:preset?preset.id:null};

  map=[];
  for(let y=0;y<MAP_H;y++){const row=[];for(let x=0;x<MAP_W;x++) row.push({facility:null,sector:null});map.push(row);}

  const placements=preset?buildInitialPlacements(preset):defaultPlacements();
  let placed=0;
  for(const p of placements){
    if(p.y<MAP_H&&p.x<MAP_W&&placed<MAP_W*MAP_H){map[p.y][p.x]={facility:p.f,sector:FACILITY_DEF[p.f]?.sector||null};placed++;}
  }
  year=1;logs=[];techEffects={};prevStocks=null;
  addLog("都市を設立しました（Year 1）","good");
}

function defaultPlacements(){
  const places=[
    [2,2,"FARM"],[3,2,"FARM"],[4,2,"FARM"],[5,2,"FARM"],[6,2,"FARM"],[7,2,"FARM"],
    [8,3,"FACT"],[9,3,"FACT"],[8,4,"POWER"],
    [11,2,"FOREST"],[12,2,"FOREST"],[13,2,"FOREST"],[14,2,"FOREST"],[11,3,"FOREST"],
    [11,5,"RIVER"],[12,5,"RIVER"],
    [3,6,"MUSE"],[4,6,"COMM"],
    [6,5,"HOUS"],[7,5,"HOUS"],
  ];
  return places.map(([x,y,f])=>({x,y,f}));
}

function buildInitialPlacements(preset){
  const base=defaultPlacements();
  const counts={};
  for(const p of base) counts[p.f]=(counts[p.f]||0)+1;
  for(const du of (preset.delta_units||[])){
    counts[du.f]=Math.max(0,(counts[du.f]||0)+du.u);
  }
  const result=[];let xi=0,yi=2;
  for(const [fac,cnt] of Object.entries(counts)){
    for(let i=0;i<cnt;i++){
      result.push({x:xi%MAP_W,y:yi,f:fac});
      xi++;if(xi%MAP_W===0){yi++;xi=0;}
    }
  }
  return result.filter(p=>p.y<MAP_H);
}

// ==================== SIMULATION CORE ====================
function countFacilities(){
  const counts={};
  for(const k of Object.keys(FACILITY_DEF)) counts[k]=0;
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    if(!map[y]) continue;
    const f=map[y][x]&&map[y][x].facility;
    if(f) counts[f]=(counts[f]||0)+1;
  }
  return counts;
}

var STANCE_OPS  ={active:1.25,normal:1.0,light:0.75};
var STANCE_MAINT={active:1.20,normal:1.0,light:0.80};

function getFacilityEff(facKey,stk,sec){
  var def=FACILITY_DEF[facKey];
  var sectorKey=def.sector;
  var effENV=1-(1-stk.ENV)*COEFF.env_to_eff;
  var effINF=1+COEFF.k_infra*(stk.INF-0.4);
  var effKNW=1+COEFF.k_knowledge*sec[sectorKey].knowledge;
  var techMult=1.0;
  if(techEffects[facKey]) techMult*=techEffects[facKey];
  if(techEffects["SECTOR:"+sectorKey]) techMult*=techEffects["SECTOR:"+sectorKey];
  var stanceMult=state&&state.stance?STANCE_OPS[state.stance[sectorKey]]||1.0:1.0;
  var eff=effENV*effINF*effKNW*techMult*stanceMult;
  eff*=(1-COEFF.hard_to_eff*stk.KON);
  return Math.max(0.1,eff);
}

// EV_DEVIATION確率・アーキタイプ選択
function calcDeviationProb(stk){
  var S=Math.max(0,stk.KON-0.45)+Math.max(0,0.45-stk.HAP)+Math.max(0,0.65-stk.ENV);
  var p=0.02+0.25*S+0.35*S*S;
  return Math.min(0.45,p);
}

function selectArchetype(stk){
  var scores={};
  var s=stk;
  scores.INDU_SURGE =(s.G<500?0.4:0)+(s.MAT<200?0.3:0);
  scores.CIVIC_BLOOM=(s.KON>0.55?0.5:0)+(s.HAP<0.40?0.4:0);
  scores.BACK_TO_LAND=(s.ENV<0.45?0.6:0)+(s.ENV<0.35?0.4:0);
  scores.AUTH_ORDER =(s.KON>0.65?0.6:0)+(s.HAP<0.35?0.2:0);
  var best="INDU_SURGE",bestV=0;
  for(var k in scores){if(scores[k]>bestV){bestV=scores[k];best=k;}}
  return best;
}

function applyDeviation(archetypeKey,accepted){
  var arc=DEVIATION_ARCHETYPES[archetypeKey];
  if(!arc) return;
  state.deviationCooldowns[archetypeKey]=(arc.cooldown||3);
  if(!accepted){
    addLog("【変動抵抗】 "+arc.name+" を抑制した。G:-200 CUL:-30","warn");
    state.stocks.G=Math.max(0,state.stocks.G-200);
    state.stocks.CUL=Math.max(0,state.stocks.CUL-30);
    if(Math.random()>0.70){addLog("抵抗は失敗した。変動は実行された。","event");accepted=true;}
    else return;
  }
  // instant effects
  var ie=arc.instant||{};
  for(var rk in ie){
    if(state.stocks[rk]!==undefined) state.stocks[rk]=Math.min(rk==="KON"||rk==="HAP"||rk==="ENV"?1:99999,Math.max(0,state.stocks[rk]+ie[rk]));
  }
  // build new units on empty tiles
  var toAdd=arc.delta_units||[];
  toAdd.forEach(function(du){
    for(var n=0;n<du.u;n++){
      var placed=false;
      for(var y=0;y<MAP_H&&!placed;y++){
        for(var x=0;x<MAP_W&&!placed;x++){
          if(map[y]&&!map[y][x].facility){map[y][x]={facility:du.f,sector:FACILITY_DEF[du.f]?FACILITY_DEF[du.f].sector:null};placed=true;}
        }
      }
    }
  });
  // remove units
  var toRm=arc.remove_units||[];
  toRm.forEach(function(du){
    var removed=0;
    for(var y=0;y<MAP_H&&removed<du.u;y++){
      for(var x=0;x<MAP_W&&removed<du.u;x++){
        if(map[y]&&map[y][x].facility===du.f){map[y][x]={facility:null,sector:null};removed++;}
      }
    }
  });
  addLog("【自律変動】 "+arc.name+" が実行された","event");
}

// Compute one turn's deltas — shared by simulateTurn and calcTurnDeltas
function computeDeltas(stk,sec,tech_state,counts,rUNIV,rMUSE){
  let FOOD_prod=0,MAT_prod=0,NRG_prod=0;
  let SCI_out=0,CUL_out=0,G_gain=0,KON_emit=0,KON_absorb=0;
  let G_maint=0,MAT_maint=0,NRG_use=0,ENV_damage=0,HAP_out=0;

  for(const [facKey,cnt] of Object.entries(counts)){
    if(!cnt) continue;
    const def=FACILITY_DEF[facKey];if(!def) continue;
    const eff=getFacilityEff(facKey,stk,sec);
    const io=def.io_base;const n=cnt;
    if(io.out.FOOD) FOOD_prod+=io.out.FOOD*n*eff*(facKey==="FARM"&&tech_state.T_IRR&&tech_state.T_IRR.done?1.12:1);
    if(io.out.MAT)  MAT_prod +=io.out.MAT*n*eff;
    if(io.out.NRG)  NRG_prod +=io.out.NRG*n*eff;
    if(io.out.SCI)  SCI_out  +=io.out.SCI*n*eff*(facKey==="UNIV"?rUNIV:1);
    if(io.out.CUL)  CUL_out  +=io.out.CUL*n*eff*(facKey==="MUSE"?rMUSE:1);
    if(io.out.G)    G_gain   +=io.out.G*n*eff;
    if(io.out.KON)  KON_emit +=io.out.KON*n*eff;
    if(io.out.HAP)  HAP_out  +=io.out.HAP*n*eff;
    ENV_damage+=def.env_sensitivity*n*eff*0.01;
    var stanceMaintMult=state&&state.stance?STANCE_MAINT[state.stance[def.sector]]||1.0:1.0;
    if(def.maint_cost.G)   G_maint  +=def.maint_cost.G*n*stanceMaintMult;
    if(def.maint_cost.MAT) MAT_maint+=def.maint_cost.MAT*n*stanceMaintMult;
    if(io.in&&io.in.NRG) NRG_use+=io.in.NRG*n*eff;
    if(["COMM","MUSE","POLICE","WASTE","EPA"].includes(facKey)) KON_absorb+=0.010*n*eff;
    if(facKey==="FOREST") KON_absorb+=0.003*n*eff;
  }
  if(tech_state.T_GRID&&tech_state.T_GRID.done) NRG_use*=0.86;
  G_maint  *=COEFF.maint_mult;
  MAT_maint*=COEFF.maint_mult;
  ENV_damage*=COEFF.env_damage_mult;

  const portCount=counts["PORT"]||0;
  const foodDemand=stk.POP*COEFF.demand_food_per_capita;
  const FOOD_before=stk.FOOD+FOOD_prod-foodDemand;
  let FOOD_import=0;
  if(FOOD_before<0&&stk.G>0){
    const importCap=foodDemand*COEFF.import_food_base*(1+COEFF.import_food_port_weight*portCount);
    FOOD_import=Math.min(importCap,Math.abs(FOOD_before),stk.G*0.4);
    G_gain-=FOOD_import;
  }

  const totalFac=Object.values(counts).reduce(function(a,b){return a+b;},0);
  const matCap=Math.round(300+stk.POP*0.4+totalFac*20);
  const newFOOD=Math.max(0,stk.FOOD+FOOD_prod+FOOD_import-foodDemand);
  const newMAT =Math.max(0,Math.min(matCap,stk.MAT+MAT_prod-MAT_maint));
  const newNRG =Math.max(0,stk.NRG +NRG_prod -NRG_use);
  const newG   =Math.max(0,stk.G   +G_gain   -G_maint);
  const newSCI =stk.SCI+SCI_out;
  const newCUL =stk.CUL+CUL_out;

  const envRec=COEFF.env_recovery_rate+(tech_state.T_STEWARD&&tech_state.T_STEWARD.done?0.012:0);
  const newENV=Math.min(1,Math.max(0,stk.ENV+envRec-ENV_damage-COEFF.hard_to_env*stk.KON*0.04));
  const newINF=Math.min(1,Math.max(0,stk.INF+(stk.G>500?0.004:stk.G>150?0.001:-0.002)));
  const newKON=Math.min(1,Math.max(0,stk.KON+KON_emit-KON_absorb-COEFF.hard_natural_decay*stk.KON));
  var fr=foodDemand>0?(stk.FOOD+FOOD_prod)/foodDemand:1;
  var hapFood=fr>1?0.005:(fr<0.5?-0.025:-0.008);
  // Signature目標達成度でHAP上限を補正
  var sig=state&&state.signature?state.signature:null;
  var sigChecks=[];
  if(sig){
    if(sig.ENV_min)      sigChecks.push(Math.min(1,stk.ENV/sig.ENV_min));
    if(sig.KON_max)      sigChecks.push(Math.min(1,sig.KON_max/Math.max(0.01,stk.KON)));
    if(sig.G_min)        sigChecks.push(Math.min(1,stk.G/sig.G_min));
    if(sig.SCI_min)      sigChecks.push(Math.min(1,stk.SCI/Math.max(1,sig.SCI_min)));
    if(sig.CUL_min)      sigChecks.push(Math.min(1,stk.CUL/Math.max(1,sig.CUL_min)));
    if(sig.POP_min)      sigChecks.push(Math.min(1,stk.POP/sig.POP_min));
    if(sig.INF_min)      sigChecks.push(Math.min(1,stk.INF/sig.INF_min));
    if(sig.RES_min)      sigChecks.push(Math.min(1,stk.RES/sig.RES_min));
    if(sig.FOOD_surplus) sigChecks.push(foodDemand>0?Math.min(1,(stk.FOOD+FOOD_prod)/(foodDemand*1.2)):1);
  }
  var sigSat=sigChecks.length>0?sigChecks.reduce(function(a,b){return a+b;},0)/sigChecks.length:0.75;
  var hapCeiling=Math.min(1,0.30+sigSat*0.70);
  var rawHAP=stk.HAP+HAP_out+hapFood+CUL_out*0.001-COEFF.hard_to_hap*stk.KON*0.04;
  if(rawHAP>hapCeiling) rawHAP=hapCeiling+(rawHAP-hapCeiling)*0.10;
  var newHAP=Math.min(hapCeiling,Math.max(0,rawHAP));
  const newRES=Math.min(1,Math.max(0,stk.RES+0.001+(stk.ENV>0.65?0.002:0)-stk.KON*0.004));

  const fr2=stk.FOOD/Math.max(1,foodDemand);
  const gf=COEFF.pop_growth.food_surplus_to_growth*Math.max(0,(fr2-1)/0.2);
  const gh=COEFF.pop_growth.hap_to_growth*(stk.HAP-0.5);
  const df=COEFF.pop_growth.food_shortage_to_decline*Math.max(0,(1-fr2)/0.15);
  const du=COEFF.pop_growth.unhap_to_decline*Math.max(0,(0.5-stk.HAP)/0.3);
  const netRate=COEFF.pop_growth.base+gf+gh+df+du;
  // 飢餓による直接人口減少（FOODが底をついた場合）
  var starvePct=(stk.FOOD<=0)?0.030:(stk.FOOD<foodDemand*0.15?0.012:0);
  const newPOP=Math.max(0,Math.round(stk.POP*(1+netRate)-stk.POP*starvePct));

  return {
    G:newG-stk.G, FOOD:newFOOD-stk.FOOD, MAT:newMAT-stk.MAT, NRG:newNRG-stk.NRG,
    SCI:newSCI-stk.SCI, CUL:newCUL-stk.CUL, POP:newPOP-stk.POP,
    ENV:newENV-stk.ENV, INF:newINF-stk.INF, HAP:newHAP-stk.HAP,
    RES:newRES-stk.RES, KON:newKON-stk.KON,
    _newFOOD:newFOOD,_newMAT:newMAT,_newNRG:newNRG,_newG:newG,
    _newSCI:newSCI,_newCUL:newCUL,_newENV:newENV,_newINF:newINF,
    _newKON:newKON,_newHAP:newHAP,_newRES:newRES,_newPOP:newPOP,
  };
}

function simulateTurn(){
  prevStocks={...state.stocks};
  const s=state.stocks;
  const counts=countFacilities();
  const rUNIV=0.8+Math.random()*0.2;
  const rMUSE=0.8+Math.random()*0.2;

  const d=computeDeltas(s,state.sectors,state.tech,counts,rUNIV,rMUSE);

  // 危機状態の判定・累積
  const inCrisis=(s.KON>COEFF.crisis_threshold_kon||s.ENV<COEFF.crisis_threshold_env||s.HAP<COEFF.crisis_threshold_hap);
  if(inCrisis) state.crisisTurns=Math.min(COEFF.crisis_max_turns,(state.crisisTurns||0)+1);
  else         state.crisisTurns=Math.max(0,(state.crisisTurns||0)-1);

  if(state.crisisTurns>0){
    const msg=`危機 ${state.crisisTurns}ターン継続中 — イベント確率+${Math.round(state.crisisTurns*COEFF.crisis_accel_per_turn*100)}%`;
    addLog(msg,"crisis");
    document.getElementById("crisis-indicator").style.display="inline";
  } else {
    document.getElementById("crisis-indicator").style.display="none";
  }

  // 株式更新
  s.FOOD=Math.max(0,s.FOOD+d.FOOD);
  s.MAT =Math.max(0,s.MAT +d.MAT);
  s.NRG =Math.max(0,s.NRG +d.NRG);
  s.G   =Math.max(0,s.G   +d.G);
  s.SCI +=d.SCI;
  s.CUL +=d.CUL;
  s.ENV =Math.min(1,Math.max(0,s.ENV+d.ENV));
  s.INF =Math.min(1,Math.max(0,s.INF+d.INF));
  s.KON =Math.min(1,Math.max(0,s.KON+d.KON));
  s.HAP =Math.min(1,Math.max(0,s.HAP+d.HAP));
  s.RES =Math.min(1,Math.max(0,s.RES+d.RES));
  s.POP =Math.max(0,Math.round(s.POP+d.POP));

  // セクター知識
  for(const sec of Object.values(state.sectors)) sec.knowledge=Math.min(10,sec.knowledge+d.SCI*0.0008);

  // イベント（危機加速込み）
  const crisisBoost=1+Math.min(COEFF.crisis_max_turns,state.crisisTurns)*COEFF.crisis_accel_per_turn;
  const eventsTriggered=[];
  for(const ev of EVENTS){
    const baseProb=ev.prob||(ev.prob_fn?ev.prob_fn(state):0);
    let prob=baseProb*COEFF.event_base_prob_mult*crisisBoost
      *(s.ENV<COEFF.event_prob_env_low.threshold?COEFF.event_prob_env_low.mult:1)
      *(s.KON>COEFF.event_prob_kon_high.threshold?COEFF.event_prob_kon_high.mult:1);
    if(Math.random()<prob){
      ev.effect(state);
      eventsTriggered.push(ev);
      addLog("【イベント】"+ev.name+": "+ev.desc,ev.good?"good":"event");
    }
  }

  // deviationクールダウン
  for(var dck in state.deviationCooldowns){state.deviationCooldowns[dck]=Math.max(0,state.deviationCooldowns[dck]-1);}

  year++;
  addLog("Year "+year+" — G:"+Math.round(s.G)+" FOOD:"+Math.round(s.FOOD)+" ENV:"+(s.ENV*100).toFixed(0)+"% KON:"+(s.KON*100).toFixed(0)+"%",null);
  npcReact(eventsTriggered,d);
  updateUI();

  // EV_DEVIATION判定
  if(!state.pendingDeviation){
    var devProb=calcDeviationProb(s)*COEFF.event_base_prob_mult*(1+Math.min(state.crisisTurns,4)*0.12);
    var arcKey=selectArchetype(s);
    var arc=DEVIATION_ARCHETYPES[arcKey];
    var coolOK=!state.deviationCooldowns[arcKey]||state.deviationCooldowns[arcKey]<=0;
    if(coolOK&&Math.random()<devProb){
      state.pendingDeviation={archetypeKey:arcKey};
      showDeviationModal(arcKey);
      return; // ターンをいったん止める
    }
  }

  // 10年エピグラフ
  if(year>1&&(year-1)%10===0){
    var ep=EPIGRAPHS[Math.floor(Math.random()*EPIGRAPHS.length)];
    showEpigraphModal(ep,year-1);
    return;
  }

  // 10年ごとのレポート
  if(year>1&&(year-1)%10===0) showReportModal(year-1);

  checkEndConditions();
}


// ==================== PREVIEW ====================
function calcTurnDeltas(){
  if(!state) return null;
  const counts=countFacilities();
  return computeDeltas(state.stocks,state.sectors,state.tech,counts,0.90,0.90);
}

function advance5Years(){
  if(!state){addLog("先にゲームを開始してください","warn");return;}
  for(var i=0;i<5;i++) simulateTurn();
}

function showPreviewBars(deltas){

  for(const g of RES_CONFIG) for(const item of g.items){

    if(!pEl) continue;
    const cur=state.stocks[item.k];

    pEl.style.background=delta>=0?item.color+"99":"#f8717199";

    const pEl=document.getElementById("preview-"+item.k);
    if(pEl){pEl.style.display="none";pEl.style.width="0";}

// ==================== TECH ====================
function researchTech(techKey){
  var td=state.tech[techKey];
  if(!td||td.done) return;
  var cost=calcTechCost(techKey,state.tech);
  if(state.stocks.SCI<cost.SCI||state.stocks.G<cost.G){
    addLog("研究失敗: "+td.name+" — SCI:"+cost.SCI+" G:"+cost.G+" 必要","warn"); return;
  }
  state.stocks.SCI-=cost.SCI;
  state.stocks.G  -=cost.G;
  td.done=true;
  addLog("研究完了: "+td.name,"good");
  var effects=td.effect||[];
  for(var ei=0;ei<effects.length;ei++){
    var eff=effects[ei];
    if(eff.type==="mult") techEffects[eff.target]=(techEffects[eff.target]||1)*eff.value;
    else techEffects[eff.target]=(techEffects[eff.target]||0)+eff.value;
  }
  updateUI();
}

function checkEndConditions(){
  var s=state.stocks;
  if(s.POP<=0) {showModal("敗北：人口消滅","すべての市民が都市を去りました。");return;}
  if(s.ENV<0.08){showModal("敗北：環境崩壊","環境が回復不能な状態に達しました。");return;}
  // signature勝利
  if(year>=50){
    var sig=state.signature||{};
    var ok=true;
    var failReason="";
    if(sig.ENV_min&&s.ENV<sig.ENV_min){ok=false;failReason="ENV "+((s.ENV*100).toFixed(0))+"% < 目標"+(sig.ENV_min*100)+"%";}
    if(sig.HAP_min&&s.HAP<sig.HAP_min){ok=false;failReason="HAP "+((s.HAP*100).toFixed(0))+"% < 目標"+(sig.HAP_min*100)+"%";}
    if(sig.KON_max&&s.KON>sig.KON_max){ok=false;failReason="KON "+((s.KON*100).toFixed(0))+"% > 上限"+(sig.KON_max*100)+"%";}
    if(sig.G_min&&s.G<sig.G_min){ok=false;failReason="G "+Math.round(s.G)+" < 目標"+sig.G_min;}
    if(sig.SCI_min&&s.SCI<sig.SCI_min){ok=false;failReason="SCI "+Math.round(s.SCI)+" < 目標"+sig.SCI_min;}
    if(sig.CUL_min&&s.CUL<sig.CUL_min){ok=false;failReason="CUL "+Math.round(s.CUL)+" < 目標"+sig.CUL_min;}
    if(sig.POP_min&&s.POP<sig.POP_min){ok=false;failReason="POP "+Math.round(s.POP)+" < 目標"+sig.POP_min;}
    if(sig.INF_min&&s.INF<sig.INF_min){ok=false;failReason="INF "+((s.INF*100).toFixed(0))+"% < 目標"+(sig.INF_min*100)+"%";}
    if(sig.RES_min&&s.RES<sig.RES_min){ok=false;failReason="RES "+((s.RES*100).toFixed(0))+"% < 目標"+(sig.RES_min*100)+"%";}
    if(ok) showModal("勝利："+((sig.label)||"都市完成")+"！","50年間、都市固有の目標を達成し続けました！");
    else   showModal("50年経過（目標未達）","都市は存続していますが、"+failReason+"。");
  }
}

    '<div style="color:#fbbf24;margin-bottom:4px">即時効果: '+ieStr+'</div>'+

    '<div style="color:#f87171">撤去: '+rmStr+'</div>'+
    '</div>'+
    '<p style="color:#888;font-size:11px">抵抗: G:-200 / CUL:-30（成功率70%）</p>'+
    '<button class="modal-btn primary" id="dev-accept">受け入れる</button>'+
    '<button class="modal-btn warn" id="dev-resist">抵抗する（G:200 CUL:30）</button>';

function showYearReviewModal(ep,yr){
  var s=state.stocks;
  var counts=countFacilities();
  var totalFac=Object.keys(counts).reduce(function(a,k){return a+(counts[k]||0);},0);
  var ruralFac=(counts.FARM||0)+(counts.AGRO||0)+(counts.FOREST||0)+(counts.RIVER||0);

  MAT:  {name:"資材 (MAT)",       formula:"産出: 工場+廃棄処理+森林 / 消費: 各施設維持費"},
  NRG:  {name:"エネルギー (NRG)", formula:"産出: 発電所+河川 / 消費: 工場・大学・美術館などの稼働"},

  KON:  {name:"困難度 (KON)",     formula:"工場・発電所・住宅が排出 / 文化・警察・森林が吸収 / 自然減衰×0.04/turn"},
};

function showTooltip(key, ex, ey) {
  if (!state) return;
  var def = TOOLTIP_DEFS[key];
  if (!def) return;
  var s = state.stocks;
  var counts = countFacilities();

  // 現在値の文字列
  var cfg = null;
  for (var gi = 0; gi < RES_CONFIG.length; gi++) {
    for (var ii = 0; ii < RES_CONFIG[gi].items.length; ii++) {
      if (RES_CONFIG[gi].items[ii].k === key) { cfg = RES_CONFIG[gi].items[ii]; break; }
    }
  }
  var valStr = cfg && cfg.pct ? (s[key]*100).toFixed(1)+"%" : Math.round(s[key]).toLocaleString();

  // 先読み計算（簡易）
  var d = calcTurnDeltas();
  var delta = d ? (d[key] || 0) : 0;
  var dStr = cfg && cfg.pct ? ((delta>=0?"+":"")+((delta*100).toFixed(2))+"%")
                             : ((delta>=0?"+":"")+Math.round(delta));
  var dCls = delta > 0.0001 ? "tt-pos" : delta < -0.0001 ? "tt-neg" : "tt-neu";

  // KONの内訳を詳細表示
  var extra = "";
  if (key === "KON") {
    var eff_fact  = getFacilityEff("FACT",  s, state.sectors);
    var eff_power = getFacilityEff("POWER", s, state.sectors);
    var eff_hous  = getFacilityEff("HOUS",  s, state.sectors);
    var eff_muse  = getFacilityEff("MUSE",  s, state.sectors);
    var eff_comm  = getFacilityEff("COMM",  s, state.sectors);
    var eff_pol   = getFacilityEff("POLICE",s, state.sectors);
    var eff_for   = getFacilityEff("FOREST",s, state.sectors);
    var emFact  = (counts.FACT||0)  * 0.008 * eff_fact;
    var emPow   = (counts.POWER||0) * 0.006 * eff_power;
    var emHous  = (counts.HOUS||0)  * 0.003 * eff_hous;
    var emAgro  = (counts.AGRO||0)  * 0.005 * getFacilityEff("AGRO", s, state.sectors);
    var abMuse  = (counts.MUSE||0)  * 0.010 * eff_muse;
    var abComm  = (counts.COMM||0)  * 0.010 * eff_comm;
    var abPol   = (counts.POLICE||0)* 0.010 * eff_pol;
    var abFor   = (counts.FOREST||0)* 0.003 * eff_for;
    var abWaste = (counts.WASTE||0) * 0.010 * getFacilityEff("WASTE",s,state.sectors);
    var abEpa   = (counts.EPA||0)   * 0.010 * getFacilityEff("EPA",  s,state.sectors);
    var decay   = COEFF.hard_natural_decay * s.KON;
    var totalEmit  = emFact+emPow+emHous+emAgro;
    var totalAbsorb= abMuse+abComm+abPol+abFor+abWaste+abEpa;
    extra =
      '<div style="margin-top:5px;border-top:1px solid #1a3a60;padding-top:4px">' +
      '<div class="tt-row"><span>工場排出(×'+( counts.FACT||0)+')</span><span class="tt-neg">+'+emFact.toFixed(4)+'</span></div>'+
      '<div class="tt-row"><span>発電所排出(×'+(counts.POWER||0)+')</span><span class="tt-neg">+'+emPow.toFixed(4)+'</span></div>'+
      '<div class="tt-row"><span>住宅排出(×'+(counts.HOUS||0)+')</span><span class="tt-neg">+'+emHous.toFixed(4)+'</span></div>'+
      '<div class="tt-row"><span>文化等吸収</span><span class="tt-pos">-'+totalAbsorb.toFixed(4)+'</span></div>'+
      '<div class="tt-row"><span>自然減衰</span><span class="tt-pos">-'+decay.toFixed(4)+'</span></div>'+
      '<div class="tt-row" style="border-top:1px solid #1a3a60;margin-top:3px;padding-top:3px"><span>純変動</span>'+
        '<span class="'+(totalEmit-totalAbsorb-decay>0?"tt-neg":"tt-pos")+'">'+(totalEmit-totalAbsorb-decay>=0?"+":"")+((totalEmit-totalAbsorb-decay)).toFixed(4)+'</span></div>'+
      '</div>';
  }

  var tt = document.getElementById("tooltip");
  tt.innerHTML =
    '<div class="tt-title">'+def.name+'</div>'+
    '<div class="tt-formula">'+def.formula+'</div>'+
    '<div class="tt-row"><span>現在値:</span><span>'+valStr+'</span></div>'+
    '<div class="tt-row"><span>次ターン予測:</span><span class="'+dCls+'">'+dStr+'</span></div>'+
    extra;
  tt.style.display = "block";
  var tw = 230, th = tt.offsetHeight || 120;
  var tx = ex + 14, ty = ey - 10;
  if (tx + tw > window.innerWidth)  tx = ex - tw - 10;
  if (ty + th > window.innerHeight) ty = ey - th - 4;
  tt.style.left = tx + "px";
  tt.style.top  = ty + "px";
}

function hideTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

// ==================== CANVAS ====================
const TILE_SIZE=40;
let canvas,ctx,offsetX=0,offsetY=0;
let isDragging=false,dragStart={x:0,y:0};
let hoverTilePos=null;

function initCanvas(){
  canvas=document.getElementById("map-canvas");
  ctx=canvas.getContext("2d");
  resizeCanvas();
  canvas.addEventListener("click",onCanvasClick);
  canvas.addEventListener("mousedown",e=>{
    if(e.button===1||e.button===2){isDragging=true;dragStart={x:e.clientX-offsetX,y:e.clientY-offsetY};}
  });
  canvas.addEventListener("mousemove",e=>{
    if(isDragging){offsetX=e.clientX-dragStart.x;offsetY=e.clientY-dragStart.y;drawMap();}
    else hoverTile(e);
  });
  canvas.addEventListener("mouseup",()=>isDragging=false);
  canvas.addEventListener("contextmenu",e=>e.preventDefault());
  canvas.addEventListener("wheel",e=>e.preventDefault(),{passive:false});

  // タッチ操作（モバイル）
  var touchStart=null,touchDragStart=null,touchMoved=false;
  canvas.addEventListener("touchstart",function(e){
    e.preventDefault();
    if(e.touches.length===1){
      var t=e.touches[0];
      touchStart={x:t.clientX,y:t.clientY};
      touchDragStart={x:t.clientX-offsetX,y:t.clientY-offsetY};
      touchMoved=false;
    }
  },{passive:false});
  canvas.addEventListener("touchmove",function(e){
    e.preventDefault();
    if(e.touches.length===1&&touchDragStart){
      var t=e.touches[0];
      var dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;
      if(Math.abs(dx)>4||Math.abs(dy)>4){
        touchMoved=true;
        offsetX=t.clientX-touchDragStart.x;
        offsetY=t.clientY-touchDragStart.y;
        drawMap();
      }
    }
  },{passive:false});
  canvas.addEventListener("touchend",function(e){
    e.preventDefault();
    if(!touchMoved&&touchStart){
      // タップ = クリックとして処理
      var fakeEvt={clientX:touchStart.x,clientY:touchStart.y};
      onCanvasClick(fakeEvt);
    }
    touchStart=null;touchDragStart=null;touchMoved=false;
  },{passive:false});

  window.addEventListener("resize",resizeCanvas);

  // ===== MOBILE TAB SWITCHING =====
  (function(){
    var tabs=document.querySelectorAll(".mob-tab");
    var leftPanel=document.getElementById("left-panel");
    var centerPanel=document.getElementById("center");
    var rightPanel=document.getElementById("right-panel");
    var secFac=document.getElementById("right-facility-section");
    var secTech=document.getElementById("right-tech-section");
    var secLog=document.getElementById("right-log-section");
    var indicator=document.getElementById("mob-fac-indicator");

    function isMobile(){return window.innerWidth<=768;}

    // モバイルでright-panel内のどのセクションを表示するか
    function applyRightSec(sec){
      secFac.classList.toggle("mob-sec-active",sec==="facility");
      secTech.classList.toggle("mob-sec-active",sec==="tech");
      secLog.classList.toggle("mob-sec-active",sec==="log");
    }

    function applyMobileLayout(){
      if(!isMobile()){
        // PC: 全パネル通常表示、セクション全表示
        leftPanel.classList.remove("mob-active");
        centerPanel.classList.remove("mob-active");
        rightPanel.classList.remove("mob-active");
        secFac.classList.remove("mob-sec-active");
        secTech.classList.remove("mob-sec-active");
        secLog.classList.remove("mob-sec-active");
        return;
      }
      // 現在のアクティブタブを読む
      var activeTab=null;
      tabs.forEach(function(t){if(t.classList.contains("active"))activeTab=t;});
      if(!activeTab)return;
      var panel=activeTab.getAttribute("data-panel");
      var sec=activeTab.getAttribute("data-sec")||"";

      leftPanel.classList.toggle("mob-active",panel==="left");
      centerPanel.classList.toggle("mob-active",panel==="center");
      rightPanel.classList.toggle("mob-active",panel==="right");

      if(panel==="right"){
        applyRightSec(sec);
      }

      // マップタブ: インジケーター表示
      if(indicator){
        indicator.style.display=(panel==="center")?"flex":"none";
      }
    }

    // タブクリック
    tabs.forEach(function(tab){
      tab.addEventListener("click",function(){
        if(!isMobile())return;
        tabs.forEach(function(t){t.classList.remove("active");});
        tab.classList.add("active");
        applyMobileLayout();
        if(tab.getAttribute("data-panel")==="center"){
          setTimeout(resizeCanvas,50);
        }
      });
    });

    // インジケータータップ → 施設タブへ
    if(indicator){
      indicator.addEventListener("click",function(){
        var facTab=document.querySelector('.mob-tab[data-sec="facility"]');
        if(facTab)facTab.click();
      });
    }

    window.addEventListener("resize",function(){
      applyMobileLayout();
    });
    applyMobileLayout();

    // 外部から呼べるようにグローバルに公開
    window.mobSwitchToFacTab=function(){
      var facTab=document.querySelector('.mob-tab[data-sec="facility"]');
      if(facTab&&isMobile())facTab.click();
    };
    window.mobSwitchToMapTab=function(){
      var mapTab=document.querySelector('.mob-tab[data-panel="center"]');
      if(mapTab&&isMobile())mapTab.click();
    };
    window.updateMobFacIndicator=function(facKey){
      if(!indicator)return;
      var iconEl=indicator.querySelector(".mfi-icon");
      var textEl=indicator.querySelector(".mfi-text");
      var hintEl=indicator.querySelector(".mfi-hint");
      if(facKey&&FACILITY_DEF[facKey]){
        var def=FACILITY_DEF[facKey];
        iconEl.textContent=def.icon;
        textEl.textContent=def.name+" を建設（タイルをタップ）";
        hintEl.textContent="▶施設変更";
        indicator.classList.add("has-fac");
      } else {
        iconEl.textContent="➕";
        textEl.textContent="施設未選択 — 施設タブで選んでください";
        hintEl.textContent="▶施設";
        indicator.classList.remove("has-fac");
      }
    };
    window.isMobileLayout=isMobile;
  })();
}

function resizeCanvas(){
  var wrap=document.getElementById("canvas-wrap");
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  drawMap();
}

function hoverTile(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left-offsetX,my=e.clientY-rect.top-offsetY;
  const tx=Math.floor(mx/TILE_SIZE),ty=Math.floor(my/TILE_SIZE);
  if(tx>=0&&tx<MAP_W&&ty>=0&&ty<MAP_H&&map[ty]){
    hoverTilePos={x:tx,y:ty};
    const f=map[ty][tx].facility;
    document.getElementById("status-msg").textContent=
      f?("["+tx+","+ty+"] "+FACILITY_DEF[f].name+" — クリックで撤去")
       :("["+tx+","+ty+"] 空き地 — クリックで配置");
  } else hoverTilePos=null;
  drawMap();
}

function onCanvasClick(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left-offsetX,my=e.clientY-rect.top-offsetY;
  const tx=Math.floor(mx/TILE_SIZE),ty=Math.floor(my/TILE_SIZE);
  if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H||!map[ty]) return;
  const tile=map[ty][tx];
  if(tile.facility){
    const def=FACILITY_DEF[tile.facility];
    tile.facility=null;tile.sector=null;
    addLog("撤去: "+def.name+" ["+tx+","+ty+"]","warn");
  } else if(selectedFacility){
    const def=FACILITY_DEF[selectedFacility];
    const cost=def.build_cost;
    if(!Object.entries(cost).every(([r,v])=>state.stocks[r]>=v)){
      addLog("建設不可: "+def.name+" — 資源不足 ("+Object.entries(cost).map(([r,v])=>r+":"+v).join(", ")+")","warn");
      return;
    }
    for(const [r,v] of Object.entries(cost)) state.stocks[r]-=v;
    tile.facility=selectedFacility;tile.sector=def.sector;
    addLog("建設: "+def.name+" ["+tx+","+ty+"]","good");
    // 建設後、施設選択を解除してインジケーターをリセット
    selectedFacility=null;
    if(window.updateMobFacIndicator)window.updateMobFacIndicator(null);
    buildFacilityUI();
  }
  drawMap();updateUI();
}

function drawMap(){
  if(!ctx) return;
  if(!map||map.length===0){ctx.clearRect(0,0,canvas.width,canvas.height);return;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0a0a1a";ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    if(!map[y]) continue;
    const px=x*TILE_SIZE+offsetX,py=y*TILE_SIZE+offsetY;
    const tile=map[y][x];
    const isHover=hoverTilePos&&hoverTilePos.x===x&&hoverTilePos.y===y;
    ctx.fillStyle=tile.facility?(FACILITY_DEF[tile.facility].color+"2a"):(isHover&&selectedFacility?"#1a3a6033":"#0d0d22");
    ctx.fillRect(px+1,py+1,TILE_SIZE-2,TILE_SIZE-2);
    ctx.strokeStyle=isHover?"#a8d8ea55":"#1a2a4a";
    ctx.strokeRect(px,py,TILE_SIZE,TILE_SIZE);
    if(isHover){
      ctx.strokeStyle=selectedFacility?"#e9456099":"#a8d8ea77";
      ctx.lineWidth=2;ctx.strokeRect(px+1,py+1,TILE_SIZE-2,TILE_SIZE-2);ctx.lineWidth=1;
    }
    if(tile.facility){
      const def=FACILITY_DEF[tile.facility];
      ctx.fillStyle=def.color;ctx.fillRect(px+1,py+1,5,5);
      ctx.font="20px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(def.icon,px+TILE_SIZE/2,py+TILE_SIZE/2);
    }
  }
}

    {k:"HAP", label:"HAP", max:1,color:"#fde68a",pct:true},
    {k:"RES", label:"RES", max:1,color:"#c4b5fd",pct:true},
    {k:"KON", label:"KON", max:1,color:"#f87171",pct:true},
  ]},
];

function buildResourcesUI(){
  const el=document.getElementById("resources");el.innerHTML="";
  for(const g of RES_CONFIG){
    const gDiv=document.createElement("div");gDiv.className="res-group";
    gDiv.innerHTML='<div class="res-group-title">'+g.group+'</div>';
    for(const item of g.items){
      const row=document.createElement("div");row.className="res-row";
      row.innerHTML=
        '<span class="res-name">'+item.label+'</span>'+
        '<div class="res-bar-wrap">'+
          '<div class="res-bar" id="bar-'+item.k+'" style="background:'+item.color+'"></div>'+
          '<div class="res-preview-bar" id="preview-'+item.k+'"></div>'+
        '</div>'+
        '<span class="res-val" id="val-'+item.k+'">-</span>'+
        '<span class="res-delta" id="delta-'+item.k+'"></span>';
      (function(k){
        row.addEventListener("mousemove", function(e){ showTooltip(k, e.clientX, e.clientY); });
        row.addEventListener("mouseleave", hideTooltip);
      })(item.k);
      gDiv.appendChild(row);
    }
    el.appendChild(gDiv);
  }
}

function updateResourcesUI(){
  if(!state) return;
  const s=state.stocks;
  for(const g of RES_CONFIG) for(const item of g.items){
    const val=s[item.k];
    const pct=Math.min(100,(val/item.max)*100);
    const bar=document.getElementById("bar-"+item.k);
    const valEl=document.getElementById("val-"+item.k);
    const dEl=document.getElementById("delta-"+item.k);
    if(bar) bar.style.width=pct+"%";
    if(valEl) valEl.textContent=item.pct?(val*100).toFixed(0)+"%":Math.round(val).toLocaleString();
    if(dEl&&prevStocks){
      const d=val-prevStocks[item.k];
      dEl.textContent=item.pct?((d>=0?"+":"")+((d*100).toFixed(1))+"%"):((d>=0?"+":"")+Math.round(d));
      dEl.style.color=d>0?"#4ade80":d<0?"#f87171":"#666";
    }
  }
  document.getElementById("year-display").textContent="Year "+year;
}

var SECTOR_LABELS={RURAL:"🌾 農村",INDU:"🏭 産業",ARTS:"🎭 学芸",NATU:"🌿 自然"};

function buildFacilityUI(){
  var el=document.getElementById("facility-list");el.innerHTML="";

  // ── スタンス選択（タブ内上部）──
  var stanceWrap=document.createElement("div");stanceWrap.id="facility-stance";
  var curSt=state&&state.stance?state.stance[activeSector]:"normal";
  var sDefs=[
    {key:"active",label:"⬆ 積極",sub:"効率+25% / 維持+20%",cls:"s-active"},
    {key:"normal",label:"〇 標準",sub:"通常運営",          cls:"s-normal"},
    {key:"light", label:"⬇ 軽量",sub:"効率-25% / 維持-20%",cls:"s-light"}
  ];
  var sh='<div class="stance-sec-label">'+(SECTOR_LABELS[activeSector]||activeSector)+' 運営方針</div>';
  sh+='<div class="stance-row-btns">';
  sDefs.forEach(function(sd){
    var on=curSt===sd.key;
    sh+='<div class="stance-row-btn'+(on?" "+sd.cls:"")+'" data-sec="'+activeSector+'" data-st="'+sd.key+'">'
      +sd.label+'<br><span style="font-size:9px;opacity:0.7">'+sd.sub+'</span></div>';
  });
  sh+='</div>';
  stanceWrap.innerHTML=sh;
  stanceWrap.querySelectorAll(".stance-row-btn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!state) return;
      state.stance[b.dataset.sec]=b.dataset.st;
      buildFacilityUI();
      var d=calcTurnDeltas();showPreviewBars(d);
    });
  });
  el.appendChild(stanceWrap);

  // ── 施設リスト ──
  var keys=Object.keys(FACILITY_DEF);
  for(var i=0;i<keys.length;i++){
    var key=keys[i];var def=FACILITY_DEF[key];
    if(def.sector!==activeSector) continue;
    var btn=document.createElement("div");
    btn.className="fac-btn"+(selectedFacility===key?" selected":"");
    var costArr=Object.keys(def.build_cost).map(function(r){return r+":"+def.build_cost[r];});
    btn.innerHTML=
      '<span class="fac-icon">'+def.icon+'</span>'+
      '<div class="fac-info">'+
        '<div>'+def.name+'</div>'+
        '<div class="fac-cost">建設: '+costArr.join(" ")+'</div>'+
      '</div>';
    (function(k,d2){btn.addEventListener("click",function(){
      selectedFacility=selectedFacility===k?null:k;
      buildFacilityUI();
      document.getElementById("status-msg").textContent=
        selectedFacility?d2.name+"を配置中 — タイルをクリック":"施設を選んでください";
      // モバイル: インジケーター更新 & マップタブへ自動遷移
      if(window.updateMobFacIndicator)window.updateMobFacIndicator(selectedFacility);
      if(selectedFacility&&window.mobSwitchToMapTab)window.mobSwitchToMapTab();
    });})(key,def);
    el.appendChild(btn);
  }
}

function buildTechUI(){
  var el=document.getElementById("tech-panel");el.innerHTML="";
  if(!state) return;
  var allTech=state.tech;
  // family color map
  var fcol={PROD:"#60a5fa",GREEN:"#4ade80",CIVIC:"#f9a8d4"};
  // sort: base techs first, then generated by family/tier
  var keys=Object.keys(allTech).sort(function(a,b){
    var at=allTech[a],bt=allTech[b];
    var af=at.family||"",bf=bt.family||"";
    if(af!==bf) return af<bf?-1:1;
    return (at.tier||0)-(bt.tier||0);
  });
  keys.forEach(function(key){
    var td=allTech[key];if(!td) return;
    var done=td.done;
    var cost=calcTechCost(key,allTech);
    var canAfford=state.stocks.SCI>=cost.SCI&&state.stocks.G>=cost.G;
    var fam=td.family||"PROD";
    var col=fcol[fam]||"#a8d8ea";
    var tierStr=td.tier?'<span class="tech-tier" style="color:'+col+'">'+["I","II","III","IV"][td.tier-1]||"?"+'</span>':"";
    var btn=document.createElement("div");
    btn.className="tech-btn"+(done?" done":"");
    btn.innerHTML=
      '<span style="color:'+col+'">'+(done?"✅":"🔬")+'</span>'+
      '<div style="flex:1"><div style="color:'+(done?"#4ade80":col)+'">'+td.name+tierStr+'</div>'+
      '<div style="color:#555;font-size:10px">SCI:'+cost.SCI+' G:'+cost.G+'</div></div>';
    if(!done){
      btn.style.opacity=canAfford?"1":"0.45";
      if(canAfford){
        (function(k){btn.addEventListener("click",function(){researchTech(k);});})(key);
      }
    }
    el.appendChild(btn);
  });
}

function buildStanceUI(){
  var el=document.getElementById("stance-bar");
  if(!el||!state) return;
  el.innerHTML="";
  var sectors=["RURAL","INDU","ARTS","NATU"];
  var labels={RURAL:"農",INDU:"産",ARTS:"芸",NATU:"然"};
  var stances=["active","normal","light"];
  var stanceLabel={active:"積",normal:"標",light:"軽"};
  sectors.forEach(function(sec){
    var grp=document.createElement("div");grp.className="stance-group";
    var lbl=document.createElement("div");lbl.className="stance-label";lbl.textContent=labels[sec];
    grp.appendChild(lbl);
    stances.forEach(function(st){
      var btn=document.createElement("div");btn.className="stance-btn";
      var cur=state.stance[sec];
      if(cur===st){
        btn.className="stance-btn "+(st==="active"?"active-stance":st==="light"?"light-stance":"active");
      }
      btn.textContent=stanceLabel[st];
      btn.title=(st==="active"?"積極（効率+25% 維持費+20%）":st==="light"?"軽量（効率-25% 維持費-20%）":"標準");
      (function(s2,st2){btn.addEventListener("click",function(){state.stance[s2]=st2;buildStanceUI();if(state){var d=calcTurnDeltas();showPreviewBars(d);}});})(sec,st);
      grp.appendChild(btn);
    });
    el.appendChild(grp);
  });
}

function updateUI(){
  updateResourcesUI();buildFacilityUI();buildTechUI();drawMap();
  if(state){var d=calcTurnDeltas();showPreviewBars(d);}
}

function addLog(msg,type){
  logs.unshift({msg,type,year});
  const el=document.getElementById("log-panel");
  el.innerHTML=logs.slice(0,40).map(l=>'<div class="log-entry '+(l.type||"")+'">'+l.msg+'</div>').join("");
}

var GEMINI_LINKS='<div style="margin-top:12px;padding:10px;background:#0a1628;border:1px solid #1a3a60;border-radius:6px">'+
  '<p style="color:#a8d8ea;font-size:12px;margin-bottom:6px">🤖 AIと一緒に遊ぶGemini版もあります：</p>'+
  '<p><a href="https://gemini.google.com/gem/1o_kjDU9WgumOgOeLsf8Nid3Bm2HHaifL?usp=sharing" target="_blank" style="color:#60a5fa;font-size:12px">▶ Gemini版 Cities: OutRuler</a></p>'+
  '</div>';

function showModal(title,body){
  var isEnd=(title.indexOf("敗北")>=0||title.indexOf("勝利")>=0);
  var m=document.getElementById("modal");
  document.getElementById("modal-box").innerHTML=
    '<h2>'+title+'</h2><p>'+body+'</p>'+
    '<p style="color:#888;font-size:11px">Year: '+year+' | POP: '+Math.round(state&&state.stocks.POP||0).toLocaleString()+' | ENV: '+((state&&state.stocks.ENV||0)*100).toFixed(0)+'%</p>'+
    (isEnd?GEMINI_LINKS:'')+
    '<button class="modal-btn primary" onclick="buildPresetUI()">新しいゲーム</button>';
  m.classList.add("open");
}

// ==================== PRESET UI ====================
function buildPresetUI(){
  const m=document.getElementById("modal");
  const box=document.getElementById("modal-box");
  box.innerHTML='<h2>Cities: OutRuler</h2><p>都市プリセットを選んでゲームを開始してください。</p><div id="preset-grid"></div><button class="modal-btn primary" id="btn-cs">カスタム（標準設定）</button>';
  m.classList.add("open");
  const grid=document.getElementById("preset-grid");
  for(const p of CITY_PRESETS){
    const card=document.createElement("div");card.className="preset-card";
    card.innerHTML='<h3>'+p.name+'</h3><p>'+p.desc+'</p>';
    card.addEventListener("click",()=>{
      m.classList.remove("open");
      initState(p);
      document.getElementById("header-preset").textContent=p.name;
      buildResourcesUI();updateUI();
    });
    grid.appendChild(card);
  }
  document.getElementById("btn-cs").addEventListener("click",()=>{
    m.classList.remove("open");
    initState(null);
    document.getElementById("header-preset").textContent="標準";
    buildResourcesUI();updateUI();
  });
}

// ==================== SAVE / LOAD ====================
document.getElementById("btn-save").addEventListener("click",()=>{
  if(!state){addLog("先にゲームを開始してください","warn");return;}
  const data=JSON.stringify({state,map,year,logs});
  const a=document.createElement("a");
  a.href="data:application/json,"+encodeURIComponent(data);
  a.download="outrule_year"+year+".json";a.click();
});
document.getElementById("btn-load").addEventListener("click",()=>{
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        state=d.state;map=d.map;year=d.year;logs=d.logs||[];
        techEffects={};
        for(const [k,v] of Object.entries(state.tech||{})){
          if(v.done&&TECH_TREE[k]) for(const eff of TECH_TREE[k].effect){
            if(eff.type==="mult") techEffects[eff.target]=(techEffects[eff.target]||1)*eff.value;
            else techEffects[eff.target]=(techEffects[eff.target]||0)+eff.value;
          }
        }
        buildResourcesUI();updateUI();addLog("セーブデータを読み込みました","good");
        document.getElementById("log-panel").innerHTML=logs.slice(0,40).map(l=>'<div class="log-entry '+(l.type||"")+'">'+l.msg+'</div>').join("");
      }catch(err){alert("読み込み失敗: "+err.message);}
    };r.readAsText(f);
  });inp.click();
});

document.getElementById("btn-turn").addEventListener("click",function(){
  if(!state){addLog("先にゲームを開始してください","warn");return;}
  simulateTurn();
});
document.getElementById("btn-5year").addEventListener("click",advance5Years);

document.querySelectorAll(".sector-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".sector-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");activeSector=tab.dataset.sector;buildFacilityUI();
  });
});

// ==================== INIT ====================
buildResourcesUI();
initCanvas();
buildPresetUI();
</script>
</body>
